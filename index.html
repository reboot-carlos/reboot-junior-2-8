<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnakeIA</title>
  <style>
    :root {
      --primary: #daa520;
      --dark:    #20c997;
      --gray:    #e8dcc8;
      --white:   #ffffff;
      --glow-primary: rgba(218, 165, 32, 0.6);
      --glow-secondary: rgba(255, 215, 0, 0.1);
    }

    :root.theme-bleu {
      --primary: #4a90d9;
      --dark:    #1e3a8a;
      --gray:    #e8eef5;
      --white:   #ffffff;
      --glow-primary: rgba(74, 144, 217, 0.6);
      --glow-secondary: rgba(74, 144, 217, 0.1);
    }

    :root.theme-violet {
      --primary: #9333ea;
      --dark:    #1e1b4b;
      --gray:    #f3e8ff;
      --white:   #ffffff;
      --glow-primary: rgba(147, 51, 234, 0.6);
      --glow-secondary: rgba(147, 51, 234, 0.1);
    }

    :root.theme-cobra {
      --primary: #ef4444;
      --dark:    #1f2937;
      --gray:    #fee2e2;
      --white:   #ffffff;
      --glow-primary: rgba(239, 68, 68, 0.6);
      --glow-secondary: rgba(239, 68, 68, 0.1);
    }

    :root.theme-couleuvre {
      --primary: #fbbf24;
      --dark:    #92400e;
      --gray:    #fef3c7;
      --white:   #ffffff;
      --glow-primary: rgba(251, 191, 36, 0.6);
      --glow-secondary: rgba(251, 191, 36, 0.1);
    }

    html, body { margin: 0; padding: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--dark);
      background-image: url('motif.svg');
      background-size: 120vw auto;
      background-repeat: repeat-y;
      background-attachment: fixed;
      background-position: center top;
      color: var(--white);
      display: flex;
      height: 100vh;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    #sidebar {
      width: 180px;
      background: linear-gradient(180deg, rgba(250, 240, 220, 0.95), rgba(232, 220, 200, 0.95));
      border-right: 2px solid var(--primary);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      overflow-y: auto;
      position: relative;
      box-shadow: inset -10px 0 20px rgba(218, 165, 32, 0.1);
      transition: all 0.3s ease;
    }

    #sidebar.closed {
      width: 0;
      padding: 0;
      border-right: none;
      overflow: hidden;
    }

    #toggle-sidebar {
      position: fixed;
      left: 1rem;
      top: 1rem;
      z-index: 9999;
      padding: 0.5rem 0.75rem;
      background: var(--primary);
      border: 2px solid var(--primary);
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: bold;
      transition: all 0.3s;
      display: none;
    }

    #toggle-sidebar:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px 2px rgba(218, 165, 32, 0.4);
    }

    #sidebar.closed ~ #toggle-sidebar {
      display: block;
    }

    .personality-btn {
      width: 130px;
      padding: 1rem;
      border: 2px solid var(--primary);
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #333;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .personality-name {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .personality-desc {
      font-weight: 400;
      font-size: 0.65rem;
      opacity: 0.8;
      text-align: center;
      line-height: 1.2;
    }

    .section-toggle-btn {
      padding: 0.6rem 0.8rem;
      border: 2px solid var(--primary);
      background: rgba(255, 255, 255, 0.6);
      color: #333;
      border-radius: 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.75rem;
      transition: all 0.3s;
      flex: 1;
      height: 100%;
    }

    .section-toggle-btn:first-child {
      border-radius: 8px 0 0 8px;
      border-right: 1px solid var(--primary);
    }

    .section-toggle-btn:last-child {
      border-radius: 0 8px 8px 0;
      border-left: 1px solid var(--primary);
    }

    .section-toggle-btn:hover {
      background: rgba(218, 165, 32, 0.2);
    }

    .section-toggle-btn.active {
      background: var(--primary);
      color: #000;
      box-shadow: 0 0 10px 1px rgba(218, 165, 32, 0.3);
    }

    .function-btn {
      width: 130px;
      padding: 1rem;
      border: 2px solid var(--primary);
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #333;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .function-emoji {
      font-size: 2rem;
    }

    .function-name {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .function-btn:hover {
      background: rgba(218, 165, 32, 0.2);
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .function-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #000;
      box-shadow: 0 0 15px 2px rgba(218, 165, 32, 0.4);
    }

    .personality-emoji {
      font-size: 2rem;
    }

    .personality-btn:hover {
      background: rgba(218, 165, 32, 0.2);
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .personality-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #000;
      box-shadow: 0 0 15px 2px rgba(218, 165, 32, 0.4);
    }

    #main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(0.5rem, 2%, 2rem);
      overflow: hidden;
      height: 100vh;
    }

    header {
      width: 100%;
      max-width: clamp(300px, 90%, 720px);
      background: var(--primary);
      padding: clamp(0.8rem, 1.2%, 1.2rem) clamp(1rem, 2%, 2rem);
      border-radius: 12px;
      margin-bottom: clamp(0.8rem, 1.5%, 1.5rem);
      display: flex;
      align-items: center;
      gap: clamp(0.5rem, 1%, 1rem);
      flex-shrink: 0;
    }

    header .logo { font-size: clamp(1.5rem, 4vw, 2.2rem); }

    header h1 {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header p {
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      opacity: 0.85;
      margin-top: 0.2rem;
    }

    #zone-chat {
      width: 100%;
      max-width: clamp(300px, 90%, 720px);
      background: linear-gradient(135deg, rgba(232, 220, 200, 1), rgba(250, 240, 220, 1));
      border-radius: 12px;
      padding: clamp(1rem, 2%, 1.5rem);
      height: clamp(200px, 35vh, 400px);
      overflow-y: auto;
      margin-bottom: clamp(0.5rem, 1%, 1rem);
      display: flex;
      flex-direction: column;
      gap: clamp(0.5rem, 0.75%, 0.75rem);
      scroll-behavior: smooth;
      position: relative;
      box-shadow: 0 0 20px 3px rgba(218, 165, 32, 0.6), inset 0 0 20px 1px rgba(255, 215, 0, 0.1);
      animation: glowPulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px 3px var(--glow-primary), inset 0 0 20px 1px var(--glow-secondary); }
      50% { box-shadow: 0 0 30px 5px var(--glow-primary), inset 0 0 30px 2px var(--glow-secondary); }
    }

    .message {
      max-width: 88%;
      padding: clamp(0.5rem, 0.75%, 0.75rem) clamp(0.7rem, 1%, 1rem);
      border-radius: 12px;
      line-height: 1.6;
      font-size: clamp(0.75rem, 1.5vw, 0.95rem);
      position: relative;
    }

    .message.bot {
      background: var(--dark);
      border-left: 3px solid var(--primary);
      align-self: flex-start;
    }

    .message.bot::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 12px;
      width: 0;
      height: 0;
      border-right: 12px solid var(--dark);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .message.user {
      background: var(--primary);
      align-self: flex-end;
      text-align: right;
    }

    .message.user::after {
      content: '';
      position: absolute;
      right: -12px;
      top: 12px;
      width: 0;
      height: 0;
      border-left: 12px solid var(--primary);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .message.loading {
      background: var(--dark);
      border-left: 3px solid var(--primary);
      align-self: flex-start;
      opacity: 0.6;
      font-style: italic;
    }

    .message.loading::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 12px;
      width: 0;
      height: 0;
      border-right: 12px solid var(--dark);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      opacity: 0.6;
    }

    #suggestions {
      width: 100%;
      max-width: clamp(300px, 90%, 720px);
      display: flex;
      flex-wrap: wrap;
      gap: clamp(0.3rem, 0.5%, 0.5rem);
      margin-bottom: clamp(0.5rem, 1%, 1rem);
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-suggestion {
      padding: clamp(0.4rem, 0.8%, 0.6rem) clamp(0.8rem, 1.5%, 1.2rem);
      border: 2px solid var(--primary);
      background: rgba(218, 165, 32, 0.2);
      color: var(--white);
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      transition: all 0.3s;
    }

    .btn-suggestion:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    #formulaire {
      width: 100%;
      max-width: clamp(300px, 90%, 720px);
      display: flex;
      gap: 0;
      padding: 0;
      box-shadow: 0 0 20px 3px rgba(218, 165, 32, 0.6), inset 0 0 20px 1px rgba(255, 215, 0, 0.1);
      animation: glowPulse 3s ease-in-out infinite;
      border-radius: 8px;
      flex-shrink: 0;
    }

    #champ-texte {
      flex: 1;
      padding: clamp(0.5rem, 1%, 0.75rem) clamp(0.7rem, 1.5%, 1rem);
      border: none;
      border-radius: 8px 0 0 8px;
      font-size: clamp(0.85rem, 2vw, 1rem);
      background: var(--gray);
      color: #333;
      outline: none;
      transition: all 0.2s;
    }

    #champ-texte::placeholder { color: #999; }
    #champ-texte:focus { background: rgba(255, 255, 255, 0.95); }

    #bouton-envoyer {
      padding: clamp(0.5rem, 1%, 0.75rem) clamp(1.5rem, 2%, 2.5rem);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0 8px 8px 0;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    #bouton-envoyer:hover { transform: scale(1.05); opacity: 0.9; }
    #bouton-envoyer:disabled { opacity: 0.45; cursor: not-allowed; }


    #theme-selector {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .theme-btn {
      padding: 0.6rem 1.2rem;
      border: 2px solid var(--primary);
      background: rgba(218, 165, 32, 0.2);
      color: var(--white);
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .theme-btn:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    .theme-btn.active {
      background: var(--primary);
      color: #333;
    }

  </style>
</head>
<body>

  <!-- Configuration serveur FastAPI -->
  <div id="config" style="display:none;" data-server-url="http://localhost:8000"></div>

  <!-- ============================================================
       SIDEBAR - Personnalités
       ============================================================ -->
  <div id="sidebar">
    <button id="close-sidebar" onclick="fermerSidebar()" style="background: transparent; border: none; color: #333; font-size: 1.5rem; cursor: pointer; align-self: flex-end; margin-right: 0.5rem; padding: 0.5rem;">✕</button>

    <a href="landing.html" style="width: 130px; text-decoration: none;">
      <button style="width: 100%; padding: 1rem; border: 2px solid var(--primary); background: rgba(32, 201, 151, 0.3); border-radius: 12px; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: #333; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem;">
        <span style="font-size: 2rem;">🏠</span>
        <span>Accueil</span>
      </button>
    </a>

    <div style="width: 85%; height: 3px; background: var(--primary); margin: 1rem 0; border-radius: 2px; opacity: 0.6;"></div>

    <!-- Boutons Personnalité et Fonction -->
    <div style="display: flex; gap: 0; margin-bottom: 1rem; width: 130px;">
      <button class="section-toggle-btn active" onclick="toggleSection('personality')" style="flex: 1;">
        <span>Perso</span>
      </button>
      <button class="section-toggle-btn" onclick="toggleSection('function')" style="flex: 1;">
        <span>Fonction</span>
      </button>
    </div>

    <!-- Section Personnalités -->
    <div id="personality-section" style="display: flex; flex-direction: column; gap: 1rem; width: 100%; align-items: center;">
      <button class="personality-btn active" onclick="changerPersonnalite('anaconda')">
      <span class="personality-emoji">🟢</span>
      <span class="personality-name">Anaconda</span>
      <span class="personality-desc">Calme et posé</span>
    </button>
    <button class="personality-btn" onclick="changerPersonnalite('cobra')">
      <span class="personality-emoji">🐍</span>
      <span class="personality-name">Cobra</span>
      <span class="personality-desc">Colérique et direct</span>
    </button>
    <button class="personality-btn" onclick="changerPersonnalite('python')">
      <span class="personality-emoji">🐲</span>
      <span class="personality-name">Python</span>
      <span class="personality-desc">Intelligent et logique</span>
    </button>
    <button class="personality-btn" onclick="changerPersonnalite('vipere')">
      <span class="personality-emoji">⚡</span>
      <span class="personality-name">Vipère</span>
      <span class="personality-desc">Excité et énergique</span>
    </button>
    <button class="personality-btn" onclick="changerPersonnalite('couleuvre')">
      <span class="personality-emoji">😄</span>
      <span class="personality-name">Couleuvre</span>
      <span class="personality-desc">Drôle et amusant</span>
    </button>
    </div>

    <!-- Section Fonctions -->
    <div id="function-section" style="display: none; flex-direction: column; gap: 1rem; width: 100%; align-items: center;">
      <button class="function-btn" onclick="changerFonction('reflexion')">
        <span class="function-emoji">🧠</span>
        <span class="function-name">Réflexion</span>
      </button>
      <button class="function-btn" onclick="changerFonction('discussion')">
        <span class="function-emoji">💬</span>
        <span class="function-name">Discussion</span>
      </button>
    </div>

  </div>

  <!-- Bouton toggle sidebar -->
  <button id="toggle-sidebar" onclick="ouvrirSidebar()">☰</button>

  <!-- ============================================================
       MAIN CONTAINER
       ============================================================ -->
  <div id="main-container">

  <!-- ============================================================
       EN-TETE
       Change l'emoji, le titre et la description pour
       personnaliser ton chatbot.
       ============================================================ -->
  <header>
    <div class="logo">🐍</div>
    <div>
      <h1 id="ia-name">Anaconda</h1>
      <p>Pose-moi une question !</p>
    </div>
  </header>

  <div id="zone-chat"></div>

  <!-- ============================================================
       SUGGESTIONS
       Ajoute ou modifie des boutons de suggestion.
       Chaque bouton appelle poserQuestion() avec un texte.
       ============================================================ -->
  <div id="suggestions">
    <button class="btn-suggestion" onclick="poserQuestion('bonjour')">👋 Bonjour</button>
    <button class="btn-suggestion" onclick="poserQuestion('qui es-tu')">🤖 Qui es-tu ?</button>
    <button class="btn-suggestion" onclick="poserQuestion('aide')">❓ Aide</button>
  </div>

  <div id="formulaire">
    <input
      id="champ-texte"
      type="text"
      placeholder="Écris ton message ici..."
    />
    <button id="bouton-envoyer" onclick="envoyerMessage()">Envoyer ➤</button>
  </div>


  <script>
    const chat  = document.getElementById('zone-chat');
    const input = document.getElementById('champ-texte');
    const btn   = document.getElementById('bouton-envoyer');
    let idMsg = 0;

    // --- Gestion des thèmes (automatique selon la personnalité) ---
    function appliquerThemePersonnalite(personality) {
      const root = document.documentElement;

      // Retirer toutes les classes de thème
      root.classList.remove('theme-bleu', 'theme-violet', 'theme-cobra', 'theme-couleuvre');

      // Appliquer le thème selon la personnalité
      switch(personality) {
        case 'cobra':
          root.classList.add('theme-cobra');
          break;
        case 'python':
          root.classList.add('theme-bleu');
          break;
        case 'anaconda':
          // Thème Mint (défaut)
          break;
        case 'vipere':
          root.classList.add('theme-violet');
          break;
        case 'couleuvre':
          root.classList.add('theme-couleuvre');
          break;
      }
    }

    // Charger et appliquer le thème de la personnalité sauvegardée au démarrage
    const savedPersonalityAtStart = localStorage.getItem('personality') || 'cobra';
    appliquerThemePersonnalite(savedPersonalityAtStart);

    // Charger le nom de l'IA sauvegardé
    const savedName = localStorage.getItem('iaName') || 'SnakeIA';
    document.getElementById('ia-name').innerHTML = `${savedName} <span class="edit-name" onclick="editerNomIA()">✏️</span>`;


    // --- Messages personnalisés par personnalité ---
    const personnalityMessages = {
      cobra: `Ha ! T'as intérêt à avoir une bonne question ! Crache ton truc, je suis direct et sans détour. Je vais t'dire ce que je pense, point. 🔥`,
      python: `Bienvenue ! Je suis Python, une IA logique et structurée. Je vais analyser tes questions avec précision et te fournir des réponses réfléchies. Posons le problème clairement. 🧠`,
      anaconda: `Bonjour... Prends le temps de bien formuler ta question, et je prendrai le temps de bien te répondre. Pas de stress, on a tout notre temps. 🌿`,
      vipere: `OUIII LET'S GOOOOO!!! Je suis trop excité de discuter avec toi!!! Pose tes questions, partage tes idées, c'est gonna be AMAZING!!! 🚀✨`,
      couleuvre: `Yo yo yo! Bienvenue! Prépare-toi pour une conversation pleine d'humour et de blagues! On va bien rigoler ensemble, c'est promis! 😂`
    };

    const personalityNames = {
      cobra: 'Cobra',
      python: 'Python',
      anaconda: 'Anaconda',
      vipere: 'Vipère',
      couleuvre: 'Couleuvre'
    };

    // --- Message de bienvenue ---
    const initialPersonality = localStorage.getItem('personality') || 'anaconda';
    document.getElementById('ia-name').textContent = personalityNames[initialPersonality];
    const welcomeMessageId = ajouterMessage('bot', personnalityMessages[initialPersonality]);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') envoyerMessage();
    });

    function envoyerMessage() {
      const texte = input.value.trim();

      if (!texte) return;

      poserQuestion(texte);
      input.value = '';
    }

    async function poserQuestion(texte) {
      ajouterMessage('user', texte);
      btn.disabled = true;

      const idLoading = ajouterMessage('loading', '⏳ Je réfléchis...');

      try {
        const serverUrl = document.getElementById('config').dataset.serverUrl;

        if (serverUrl === 'https://ton-username.replit.dev') {
          supprimerMessage(idLoading);
          ajouterMessage('bot', 'Configuration manquante ! Remplace ton-username par ton URL Replit 🚀');
          btn.disabled = false;
          return;
        }

        const response = await fetch(serverUrl + '/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ texte: texte })
        });

        const data = await response.json();

        if (!response.ok) {
          supprimerMessage(idLoading);
          const errorMsg = data.reponse || 'Erreur serveur';
          ajouterMessage('bot', `${errorMsg} 🔑`);
          btn.disabled = false;
          return;
        }

        const reponse = data.reponse;
        supprimerMessage(idLoading);
        ajouterMessage('bot', reponse);
      } catch (error) {
        supprimerMessage(idLoading);
        ajouterMessage('bot', "Erreur de connexion 😔 Vérifie que le serveur est en ligne");
        console.error('Erreur:', error);
      }

      btn.disabled = false;
      chat.scrollTop = chat.scrollHeight;
    }

    // ============================================================
    // NOTE : La base de connaissances est maintenant gérée par FastAPI (main.py)
    // Pour modifier les réponses, édite la fonction traiter_question() dans main.py
    // ============================================================

    // ============================================================
    // NOTE : Le traitement des questions est maintenant géré par FastAPI
    // Les fonctions ci-dessous ne sont plus utilisées (remplacées par l'API)
    // ============================================================

    // --- Helpers d'affichage (tu n'as normalement pas besoin d'y toucher) ---

    function ajouterMessage(type, html) {
      const id = `msg-${++idMsg}`;
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.id = id;
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return id;
    }

    function supprimerMessage(id) {
      document.getElementById(id)?.remove();
    }

    // --- Gestion de la sidebar ---
    let sidebarOpen = localStorage.getItem('sidebarOpen') !== 'false';
    let currentSection = localStorage.getItem('sidebarSection') || 'personality';
    let currentFunction = localStorage.getItem('function') || 'discussion';

    function ouvrirSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('closed');
      localStorage.setItem('sidebarOpen', 'true');
    }

    function fermerSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.add('closed');
      localStorage.setItem('sidebarOpen', 'false');
    }

    // Initialiser l'état de la sidebar au chargement
    if (!sidebarOpen) {
      document.getElementById('sidebar').classList.add('closed');
    }

    // --- Gestion des sections (Personnalité / Fonction) ---
    function toggleSection(section) {
      currentSection = section;
      localStorage.setItem('sidebarSection', section);

      // Mettre à jour l'affichage
      document.getElementById('personality-section').style.display = section === 'personality' ? 'flex' : 'none';
      document.getElementById('function-section').style.display = section === 'function' ? 'flex' : 'none';

      // Mettre à jour les boutons actifs
      const buttons = document.querySelectorAll('.section-toggle-btn');
      buttons.forEach(btn => btn.classList.remove('active'));

      // Activer le bon bouton
      if (event && event.target) {
        event.target.closest('.section-toggle-btn').classList.add('active');
      } else {
        // Au chargement initial
        const activeBtn = document.querySelector(`[onclick="toggleSection('${section}')"]`);
        if (activeBtn) activeBtn.classList.add('active');
      }
    }

    // Initialiser la section au chargement
    if (currentSection === 'personality') {
      document.querySelector('[onclick="toggleSection(\'personality\')"]').classList.add('active');
    } else {
      document.querySelector('[onclick="toggleSection(\'function\')"]').classList.add('active');
    }
    toggleSection(currentSection);

    // --- Gestion des fonctions ---
    function changerFonction(fonction) {
      currentFunction = fonction;
      localStorage.setItem('function', fonction);

      const buttons = document.querySelectorAll('.function-btn');
      buttons.forEach(btn => btn.classList.remove('active'));

      // Trouver et activer le bon bouton
      if (event && event.target) {
        event.target.closest('.function-btn').classList.add('active');
      } else {
        const btn = document.querySelector(`[onclick="changerFonction('${fonction}')"]`);
        if (btn) btn.classList.add('active');
      }
    }

    // Initialiser la fonction au chargement
    setTimeout(() => {
      const initialFunctionBtn = document.querySelector(`[onclick="changerFonction('${currentFunction}')"]`);
      if (initialFunctionBtn) {
        initialFunctionBtn.classList.add('active');
      }
    }, 100);

    // --- Gestion des personnalités ---
    let personaliteCourante = localStorage.getItem('personality') || 'cobra';

    function changerPersonnalite(personality) {
      personaliteCourante = personality;
      localStorage.setItem('personality', personality);

      const buttons = document.querySelectorAll('.personality-btn');
      buttons.forEach(btn => btn.classList.remove('active'));

      // Trouver et activer le bon bouton
      if (event && event.target) {
        event.target.closest('.personality-btn').classList.add('active');
      } else {
        // Si appelé programmatiquement
        const btn = document.querySelector(`[onclick="changerPersonnalite('${personality}')"]`);
        if (btn) btn.classList.add('active');
      }

      // Appliquer le thème correspondant
      appliquerThemePersonnalite(personality);

      // Mettre à jour le nom de l'IA
      document.getElementById('ia-name').textContent = personalityNames[personality];

      // Mettre à jour le message de bienvenue
      const welcomeMsg = document.getElementById(welcomeMessageId);
      if (welcomeMsg) {
        welcomeMsg.innerHTML = personnalityMessages[personality];
      }
    }

    // Charger la personnalité sauvegardée au démarrage
    const savedPersonality = localStorage.getItem('personality') || 'cobra';
    const personalityBtn = document.querySelector(`[onclick="changerPersonnalite('${savedPersonality}')"]`);
    if (personalityBtn) {
      personalityBtn.classList.add('active');
      personalityBtn.parentElement.querySelectorAll('.personality-btn').forEach(btn => {
        if (btn !== personalityBtn) btn.classList.remove('active');
      });
    }
  </script>

  </div><!-- Fin main-container -->

</body>
</html>
