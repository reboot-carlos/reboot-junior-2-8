<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnakeIA - Chatbot Intelligent</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/chatbot.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Configuration serveur (chemin relatif = fonctionne en local et en production) -->
  <div id="config" style="display:none;" data-server-url=""></div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Flèche toggle toujours visible -->
    <button class="sidebar-toggle-arrow" id="sidebarArrow" onclick="toggleSidebar()">◀</button>

    <!-- Header Sidebar -->
    <div class="sidebar-header">
      <h2>SnakeIA</h2>
    </div>

    <!-- Onglets Sidebar -->
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="history" onclick="switchTab('history')">
        <span class="tab-icon">📜</span>
        <span class="tab-label">Historique</span>
      </button>
      <button class="sidebar-tab" data-tab="personality" onclick="switchTab('personality')">
        <span class="tab-icon">🐍</span>
        <span class="tab-label">Personnalités</span>
      </button>
      <button class="sidebar-tab" data-tab="function" onclick="switchTab('function')">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">Fonctions</span>
      </button>
    </div>

    <!-- Contenu Sidebar -->
    <div class="sidebar-content">

      <!-- Onglet Historique -->
      <div class="sidebar-section active" data-section="history">
        <button onclick="newConversationFromSidebar()" style="width:100%;padding:0.75rem;background:var(--primary);color:#000;border:none;border-radius:8px;font-weight:700;font-size:0.95rem;cursor:pointer;margin-bottom:1rem;">
          + Nouvelle discussion
        </button>
        <div class="history-list" id="historyList">
          <p class="empty-state">Aucune conversation</p>
        </div>
        <button class="btn-secondary" onclick="clearHistory()" style="width: 100%; margin-top: 1rem;">
          Effacer l'historique
        </button>
      </div>

      <!-- Onglet Personnalités -->
      <div class="sidebar-section" data-section="personality">
        <div class="personality-grid" id="personalityGrid">
          <!-- Généré par JavaScript -->
        </div>
      </div>

      <!-- Onglet Fonctions -->
      <div class="sidebar-section" data-section="function">
        <div class="function-list" id="functionList">
          <!-- Généré par JavaScript -->
        </div>
      </div>

    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- HEADER -->
    <header class="header">

      <div class="header-info">
        <div class="personality-badge">
          <span class="badge-emoji" id="headerEmoji">🟢</span>
          <div>
            <h1 id="headerName">Anaconda</h1>
            <p id="headerMode">Discussion</p>
          </div>
        </div>
      </div>

      <div class="header-actions">
        <a href="/" class="btn-icon" title="Accueil">🏠</a>
      </div>
    </header>

    <!-- ZONE CHAT -->
    <section class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <!-- Messages générés par JavaScript -->
      </div>
      <div class="chat-suggestions" id="chatSuggestions">
        <!-- Suggestions générées par JavaScript -->
      </div>
    </section>

    <!-- INPUT FORMULAIRE -->
    <form class="chat-input-form" onsubmit="sendMessage(event)">
      <input
        type="text"
        id="messageInput"
        class="chat-input"
        placeholder="Écris ton message..."
        autocomplete="off"
      />
      <button type="submit" class="btn-send">
        Envoyer ➤
      </button>
    </form>

  </main>

  <!-- Modal de renommage -->
  <div id="renameModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:var(--dark);border:2px solid var(--primary);border-radius:12px;padding:2rem;width:90%;max-width:380px;box-shadow:0 0 30px var(--glow-primary);">
      <h3 style="color:var(--primary);margin-bottom:1rem;text-align:center;">Renommer la discussion</h3>
      <input id="renameInput" type="text" style="width:100%;padding:0.75rem;border:2px solid var(--primary);border-radius:8px;font-size:1rem;background:var(--gray);color:#333;outline:none;box-sizing:border-box;margin-bottom:1.5rem;" />
      <div style="display:flex;gap:1rem;justify-content:center;">
        <button id="renameConfirm" style="padding:0.7rem 1.5rem;background:var(--primary);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;">OK ✓</button>
        <button id="renameCancel" style="padding:0.7rem 1.5rem;background:transparent;color:var(--white);border:2px solid var(--primary);border-radius:8px;font-weight:700;cursor:pointer;">Annuler</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="js/utils.js"></script>
  <script src="js/personality.js"></script>
  <script src="js/history.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
