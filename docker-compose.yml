version: '3.8'

services:
  frontend:
    image: nginx:alpine
    container_name: snakeIA-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - snakeIA-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snakeIA-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - SERVER_PORT=8000
      - API_KEY=${API_KEY:-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    networks:
      - snakeIA-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  snakeIA-network:
    driver: bridge
